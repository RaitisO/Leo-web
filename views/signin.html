<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Private Teacher - Home</title>
  <link rel="stylesheet" href="/styles/index.css" />
</head>
<body>
  <header>
    <div class="logo">Teacher Name</div>
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>
<div class="container">
    <h1>Login</h1>
    <form action="/login" method="POST">
        <div class="form-group">
            <label for="identifier">Username or Email:</label>
            <input type="text" placeholder="Type your Username or Email..." id="identifier" name="identifier" required>
            <div id="login-error" class="error"></div>
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" placeholder="Type your Password..." id="password" name="password" required>
        </div>
        <button class="btn" type="submit"><span>Login</span></button>
    </form>
    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
</div>
</body>
</html>
